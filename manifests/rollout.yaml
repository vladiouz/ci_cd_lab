apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/vladiouz/ci_cd_lab:sha256:3e53ab787ba7c2a7700cce248d917efa336ad07059a9fa20c15be407744bb203
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
